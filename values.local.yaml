# centaur-lab MVP — the ONLY chart customization layered on top of
# .centaur/contrib/chart/values.dev.yaml. Keep this file minimal; every
# additional knob is one more thing that can drift across upstream bumps.

ironProxy:
  # Resolve credentials from the centaur-infra-env Kubernetes Secret
  # directly. No 1Password Connect or service account.
  secretSource: env

  # Same imagePullPolicy fix as `api.image.pullPolicy` below — kubelet's
  # default for `:latest` is Always, which makes it try to pull the
  # locally-built centaur-iron-proxy:latest from a registry. Force it to
  # use the local image.
  image:
    pullPolicy: IfNotPresent

api:
  # Default harness when a Slack mention has no explicit selector. Claude
  # Code by default because Anthropic is our primary credential; override
  # per-turn with `--codex`, `--amp`, or `--pi` once those keys are set.
  defaultHarness: claude-code

  # Save laptop CPU/memory; sandboxes spawn cold per turn. Acceptable for
  # smoke and early development. Re-enable in production values.
  warmPoolEnabled: false

  # Enable scheduled Slack history sync (`slack_sync`, `slack_backfill`,
  # `company_context_documents` workflows). Requires SLACK_ETL_TOKEN
  # (a Slack USER token, distinct from SLACK_BOT_TOKEN) in .env. With it
  # unset, the workflows will run on schedule but log token errors —
  # set it before flipping this on. See docs/centaur/operate/slack-etl.md.
  slackEtlEnabled: true

  # The chart's default for `:latest`-tagged images is Always, which makes
  # kubelet try to pull centaur-api:latest from a public registry instead of
  # using the locally-built image. Slackbot already has IfNotPresent set in
  # values.dev.yaml; this matches that behavior for the API. (Same fix
  # repeated below for ironProxy and sandbox — upstream values.dev.yaml
  # only covers slackbot.)
  image:
    pullPolicy: IfNotPresent

sandbox:
  # Same image-pull fix: sandbox pods spawn per agent turn, get the same
  # default `pullPolicy: Always`, and silently fail with "sandbox readiness
  # timed out" after 60s because kubelet can't pull centaur-agent:latest
  # from any registry. Without this override, every Slack mention errors out.
  image:
    pullPolicy: IfNotPresent

slackbot:
  # Slack ingress enabled. Requires real SLACK_BOT_TOKEN and
  # SLACK_SIGNING_SECRET in .env, plus a `cloudflared` tunnel + a
  # `kubectl port-forward` exposing the Slackbot Service at a stable public
  # URL Slack can hit. See cloudflared/README.md.
  enabled: true
