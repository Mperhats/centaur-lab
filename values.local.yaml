# Laptop-only overrides layered on values.org.yaml.

ironProxy:
  image:
    pullPolicy: IfNotPresent

api:
  warmPoolEnabled: false
  image:
    pullPolicy: IfNotPresent

sandbox:
  image:
    pullPolicy: IfNotPresent
  reposPath: /var/lib/centaur/repos

overlay:
  image:
    pullPolicy: IfNotPresent

repoCache:
  hostPath: /var/lib/centaur/repos
