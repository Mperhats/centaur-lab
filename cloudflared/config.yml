# Cloudflare Tunnel routes for the centaur-lab dev stack.
#
# The tunnel runs as a launchd user agent installed by
# `just cloudflared::install-service` (see README.md in this directory). One
# public hostname (centaur.local-labs.xyz) fans out to two local backends
# based on path:
#
#   /api/webhooks/slack     -> Slackbot (localhost:3001) — Slack Events
#   everything else         -> API      (localhost:8000) — workflow webhooks
#                                                          (github_issue_triage,
#                                                          /workflows/runs, etc.)
#
# Both port-forwards are owned by `just dev`. After editing this file, reload
# the launch agent so cloudflared re-reads it:
#   just cloudflared::uninstall-service --yes
#   just cloudflared::install-service
#
# For ad-hoc foreground debugging only (uninstall the service first to avoid
# a connector race):
#   just cloudflared::run
#
# `credentials-file` is intentionally omitted: cloudflared resolves it
# automatically from `~/.cloudflared/<TUNNEL-UUID>.json` after you've run
# `cloudflared tunnel login` and `cloudflared tunnel create centaur-dev`.
# That credentials JSON is a per-machine secret and must NEVER be committed.
# See README.md in this directory for one-time setup steps on a fresh machine.

tunnel: centaur-dev

ingress:
  # Slack Events API. Must come first — path rules are matched in order.
  - hostname: centaur.local-labs.xyz
    path: /api/webhooks/slack
    service: http://localhost:3001
  # Centaur API (workflow webhooks, /workflows/runs, /agent/*, etc.).
  - hostname: centaur.local-labs.xyz
    service: http://localhost:8000
  # Required catch-all — cloudflared refuses to start without it.
  - service: http_status:404
