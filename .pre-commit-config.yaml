# Hard enforcement that notebook outputs never reach the index.
# Runs in addition to the nbstripout git clean filter (.gitattributes) —
# the filter is the ergonomic path (auto-strips on `git add`); this hook
# is the safety net that catches clones where the filter isn't registered.
#
# Setup (once per clone):
#   uv tool install pre-commit
#   pre-commit install

repos:
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout
