[project]
name = "overlay-workflows"
description = "Centaur-lab workflows projected into the API pod via WORKFLOW_DIRS."
version = "0.1.0"
requires-python = ">=3.11"
dependencies = []

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

# Workflows are not built as a wheel; the API pod discovers *.py files at
# runtime via WORKFLOW_DIRS. This pyproject only exists so `uv run pytest`
# can resolve test deps locally without polluting the tool packages.
[tool.uv]
package = false

[tool.pytest.ini_options]
asyncio_mode = "strict"
