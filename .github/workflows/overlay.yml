name: Overlay

on:
  push:
    branches: [main]
    paths:
      - overlay/**
      - .github/workflows/overlay.yml
  pull_request:
    paths:
      - overlay/**
      - .github/workflows/overlay.yml
  workflow_dispatch:

concurrency:
  group: overlay-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/centaur-overlay
  IMAGE_SOURCE: https://github.com/${{ github.repository }}

jobs:
  test:
    name: Lint and test overlay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          enable-cache: true

      - name: Lint tools
        working-directory: overlay/tools
        run: uvx ruff check .

      - name: Lint workflows
        working-directory: overlay/workflows
        run: uvx ruff check .

      - name: Install semantic_scholar test deps
        working-directory: overlay/tools/semantic_scholar
        run: uv sync --group dev --python 3.11

      - name: Test semantic_scholar tool
        working-directory: overlay/tools/semantic_scholar
        run: uv run --python 3.11 pytest tests/ --ignore=tests/integration -v

      - name: Install workflows test deps
        working-directory: overlay/workflows
        run: uv sync --group dev --python 3.11

      - name: Test workflows
        working-directory: overlay/workflows
        run: uv run --python 3.11 pytest tests/ --ignore=tests/integration -v

  publish:
    name: Build and push overlay image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
          labels: |
            org.opencontainers.image.title=centaur-overlay
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: overlay
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=overlay
          cache-to: type=gha,mode=max,scope=overlay
