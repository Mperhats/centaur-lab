name: Overlay

on:
  push:
    branches: [main]
    paths:
      - tools/**
      - workflows/**
      - packages/**
      - .agents/**
      - services/**
      - tests/**
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - uv.lock
      - ruff.toml
      - .github/workflows/overlay.yml
  pull_request:
    paths:
      - tools/**
      - workflows/**
      - packages/**
      - .agents/**
      - services/**
      - tests/**
      - Dockerfile
      - .dockerignore
      - pyproject.toml
      - uv.lock
      - ruff.toml
      - .github/workflows/overlay.yml
  workflow_dispatch:

concurrency:
  group: overlay-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/centaur-overlay
  IMAGE_SOURCE: https://github.com/${{ github.repository }}

jobs:
  test:
    name: Lint and test overlay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8
        with:
          enable-cache: true

      - name: Install dev deps + aggregated runtime deps
        run: uv sync --python 3.11

      - name: Lint
        run: uv run --python 3.11 ruff check .

      # Mirrors main's ``pytest tests/ -v`` but tolerates the
      # transient empty-tests state on this branch. Unit tests were
      # parked in the gitignored ``tmp/test-old/`` mirror during the
      # centaur_lab → S2 dispersal (see ``AGENTS.md`` Conventions),
      # so right now ``tests/`` either doesn't exist (pytest exit 4 =
      # usage error / no such directory) or will exist as a stub
      # without test files (exit 5 = no tests collected). Both are
      # benign while the unit suite is reinstated against the new
      # ``projections/`` + inlined-persistence shape; any other exit
      # code is a real failure and propagates.
      - name: Test
        run: |
          set +e
          uv run --python 3.11 pytest tests/ -v
          rc=$?
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 4 ] && [ "$rc" -ne 5 ]; then
            exit "$rc"
          fi

  publish:
    name: Build and push overlay image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - uses: docker/setup-qemu-action@49b3bc8e6bdd4a60e6116a5414239cba5943d3cf # v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
          labels: |
            org.opencontainers.image.title=centaur-overlay
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          # Build both arches so Docker Desktop on Apple Silicon can pull from
          # GHCR directly (single-arch amd64 would force `--platform linux/amd64`
          # + Rosetta on M-series Macs). buildx fans out via QEMU emulation;
          # the overlay image is small enough that arm64 emulation stays fast.
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=overlay
          cache-to: type=gha,mode=max,scope=overlay
