name: Overlay

on:
  push:
    branches: [main]
    paths:
      - overlay/**
      - .github/workflows/overlay.yml
  pull_request:
    paths:
      - overlay/**
      - .github/workflows/overlay.yml
  workflow_dispatch:

concurrency:
  group: overlay-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}/centaur-overlay
  IMAGE_SOURCE: https://github.com/${{ github.repository }}

jobs:
  test:
    name: Lint and test overlay
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true

      - name: Lint tools
        working-directory: overlay/tools
        run: uvx ruff check .

      - name: Lint workflows
        working-directory: overlay/workflows
        run: uvx ruff check .

      - name: Install semantic_scholar test deps
        working-directory: overlay/tools/semantic_scholar
        run: uv sync --group dev --python 3.11

      - name: Test semantic_scholar tool
        working-directory: overlay/tools/semantic_scholar
        run: uv run --python 3.11 pytest tests/ --ignore=tests/integration -v

      - name: Install workflows test deps
        working-directory: overlay/workflows
        run: uv sync --group dev --python 3.11

      - name: Test workflows
        working-directory: overlay/workflows
        run: uv run --python 3.11 pytest tests/ --ignore=tests/integration -v

  publish:
    name: Build and push overlay image
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
          labels: |
            org.opencontainers.image.title=centaur-overlay
            org.opencontainers.image.source=${{ env.IMAGE_SOURCE }}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: overlay
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=overlay
          cache-to: type=gha,mode=max,scope=overlay
