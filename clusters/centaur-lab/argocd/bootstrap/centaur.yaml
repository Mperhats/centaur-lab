# TEMPLATE — fill placeholders before applying. Not deployable as-is.
#
# Pins the Centaur Helm chart to a commit SHA (not main). Example submodule SHA:
#   0656aeb56c9e6e98507494cfb1c0408ffbf57b65
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: centaur-lab
  namespace: argocd
  # Optional: Argo CD Image Updater for overlay.image.tag once GHCR CI exists.
  # annotations:
  #   argocd-image-updater.argoproj.io/image-list: overlay=ghcr.io/Mperhats/centaur-lab/centaur-overlay
spec:
  project: default
  sources:
    - repoURL: https://github.com/paradigmxyz/centaur.git
      targetRevision: <CENTAUR_CHART_SHA>
      path: contrib/chart
      helm:
        valueFiles:
          - $values/clusters/centaur-lab/argocd/values/centaur.yaml
        parameters:
          - name: overlay.image.repository
            value: ghcr.io/Mperhats/centaur-lab/centaur-overlay
            forceString: true
          - name: overlay.image.tag
            value: <OVERLAY_TAG>
            forceString: true
          - name: api.image.tag
            value: <CENTAUR_IMAGE_TAG>
            forceString: true
          - name: slackbot.image.tag
            value: <CENTAUR_IMAGE_TAG>
            forceString: true
          - name: sandbox.image.tag
            value: <CENTAUR_IMAGE_TAG>
            forceString: true
          - name: ironProxy.image.tag
            value: <CENTAUR_IMAGE_TAG>
            forceString: true
    - repoURL: https://github.com/<ORG>/centaur-lab.git
      targetRevision: <INFRA_REF>
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: centaur-system
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    automated:
      prune: true
      selfHeal: true
