ironProxy:
  secretSource: env

api:
  defaultHarness: claude-code
  slackEtlEnabled: true
  slackSyncBackfillLookbackDays: 700

slackbot:
  enabled: true

# Overlay image is published by .github/workflows/overlay.yml on every push
# to main as ghcr.io/mperhats/centaur-lab/centaur-overlay:sha-<7char>. The
# root `just deploy` recipe resolves the tag automatically:
#   1. $OVERLAY_TAG (explicit pin)
#   2. .tag                   (local Docker Desktop build via `just build`)
#   3. sha-<short origin/main> (default, pulled from GHCR)
# In mode 2 the deploy recipe also overrides repository back to bare
# `centaur-overlay` so the image lookup hits the local Docker daemon.
overlay:
  image:
    repository: ghcr.io/mperhats/centaur-lab/centaur-overlay
    pullPolicy: IfNotPresent

repoCache:
  enabled: true
  repositories:
    - Mperhats/centaur-lab
  syncIntervalSeconds: 300
  githubToken:
    existingSecretName: centaur-infra-env
    secretKey: GITHUB_TOKEN
