[project]
name = "semantic-scholar"
version = "0.1.0"
description = "Search Semantic Scholar, fetch paper metadata, walk the citation graph, and build research-brief bundles."
requires-python = ">=3.11"
license = "Apache-2.0 OR MIT"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Runtime manifest read by upstream's tool_manager. Dev/test deps live
# in the root pyproject.toml (single venv); this file exists for two
# things only:
#   1. Tool discovery (tool_manager scans tools/<name>/pyproject.toml)
#   2. iron-proxy header injection (the [tool.centaur].secrets block
#      tells the firewall to substitute the real key for outbound
#      requests to api.semanticscholar.org).
#
# ``secrets`` (required, not ``optional_secrets``): the agent only sees
# this tool when the cluster Secret resolves SEMANTIC_SCHOLAR_API_KEY.
# Anonymous calls would degrade silently to S2's tight 1 req/sec
# unauthenticated rate limit — better to hide the tool than have the
# agent burn turns on rate-limit errors.
[tool.centaur]
module = "client.py"
secrets = [
    {type = "http", name = "SEMANTIC_SCHOLAR_API_KEY", match_headers = ["x-api-key"], hosts = ["api.semanticscholar.org"]},
]
