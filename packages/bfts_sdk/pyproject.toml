# BFTS controller internals (Sakana AI Scientist-v2 best-first tree
# search) packaged as a uv workspace member. The package itself stays
# in-tree as a flat Python module — ``package = false`` opts out of
# wheel building so uv only contributes our ``[project].dependencies``
# to the root ``.venv``, and consumers keep importing us as
# ``from packages.bfts_sdk.config import …`` (resolved via the
# repo-root ``pythonpath`` entry in the root ``pyproject.toml``).
#
# Single source of truth for what BFTS pulls in at runtime — kept here
# so the root ``pyproject.toml`` doesn't have to mirror our deps and
# silently drift.
[project]
name = "bfts-sdk"
version = "0.1.0"
description = "BFTS controller internals (config, state, expand/select, metric, export) shared by bfts_* workflows."
requires-python = ">=3.11"
license = "Apache-2.0 OR MIT"
dependencies = [
    "asyncpg>=0.30.0",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Not a publishable wheel — uv treats this as a workspace member that
# contributes its ``[project].dependencies`` to the root ``.venv``
# without trying to install the package itself (consumers import
# ``packages.bfts_sdk.*`` directly from the source tree).
[tool.uv]
package = false
