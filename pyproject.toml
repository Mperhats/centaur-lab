[project]
name = "centaur-lab-overlay"
version = "0.1.0"
description = "centaur-lab organization overlay for Centaur (academic research domain)"
requires-python = ">=3.11"
license = "Apache-2.0 OR MIT"

# Aggregated runtime dependencies from every overlay tool and workflow.
# The Centaur API pod still installs each tool's deps from
# ``tools/<name>/pyproject.toml`` at runtime — this list is the dev/test
# mirror that lets a single root ``.venv`` import any tool or workflow
# module the same way the API pod will.
dependencies = [
    "asyncpg>=0.30.0",
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
    "pymupdf>=1.24.0",
    "pymupdf4llm>=0.0.17",
    "pypdf>=4.0.0",
    "python-dotenv>=1.0.0",
    "rich>=13.0.0",
    "semanticscholar>=0.12.0",
    "typer>=0.12.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "ruff>=0.6.0",
]

# We do not want uv to try to package the overlay itself — this repo is
# a Docker image build context, not a publishable Python distribution.
[tool.uv]
package = false

[tool.pytest.ini_options]
testpaths = ["tests"]
# ``.`` puts the ``tools.*`` and ``workflows`` namespace on sys.path so
# tests can import ``from tools.semantic_scholar.client import ...`` and
# ``from workflows.research_brief import handler`` — byte-identical to
# how the Centaur API pod resolves these at runtime via TOOL_DIRS /
# WORKFLOW_DIRS bootstrap. ``.centaur`` exposes ``centaur_sdk``.
pythonpath = [".", ".centaur"]
asyncio_mode = "strict"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]
